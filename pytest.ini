[pytest]
testpaths = tests
pythonpath = /home/paulsportsza/bot /home/paulsportsza/scripts
asyncio_mode = strict
timeout = 30
addopts = --ignore=tests/e2e_telegram.py --ignore=tests/e2e_telethon.py --ignore=tests/test_e2e_flow.py --ignore=tests/test_e2e_live.py --ignore=tests/test_e2e_quality_test.py --ignore=tests/tier_gating_test.py -m "not integration and not live_db"
markers =
    integration: slow tests that hit real external APIs (Anthropic, live bot). Skipped by default in pytest -q.
    live_db: smoke tests that read live scrapers/odds.db state (current odds, edge_results). Excluded from the pre-merge gate because their pass/fail depends on whatever rows happen to be in the DB at test time. Run explicitly via `pytest -m live_db` for smoke-style coverage.
