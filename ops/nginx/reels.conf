# FIX-REEL-MASTER-URL-CONTRACT-01 — public route for reel master MP4s.
#
# Lives in: /etc/nginx/sites-enabled/mzansiedge (NOT in this repo — Nginx
# loads from /etc/nginx/sites-enabled/* and the file is owned by root).
# This snippet is the canonical source of truth — paste it into the live
# server block above the generic regex match for *.png/*.css/*.js.
#
# Why scoped: master files are 25–30 MB, regenerated only on operator re-upload.
# 5-minute revalidate gap matches the FIX-DASH-REEL-WIDGET-01 reel-cards rule.
# NOT immutable — masters CAN be re-uploaded under the same row_id, and the
# widget appends ?v=<file_mtime> to bust within the revalidate window.
#
# Layout (see ops/REEL-MASTER-CONTRACT.md):
#   FS:  /home/paulsportsza/bot/assets/reels/<YYYY-MM-DD>/final/<row_id>.mp4
#   URL: https://mzansiedge.co.za/assets/reels/<YYYY-MM-DD>/final/<row_id>.mp4
#
# Apply:
#   sudo cp ops/nginx/reels.conf /etc/nginx/sites-available/reels.conf
#   # paste the location block into /etc/nginx/sites-enabled/mzansiedge
#   sudo nginx -t && sudo systemctl reload nginx

location ^~ /assets/reels/ {
    alias /home/paulsportsza/bot/assets/reels/;
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    types { video/mp4 mp4; }
    access_log off;
}
