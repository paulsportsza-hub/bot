# News images — FIX-NEWS-IMAGE-UPLOAD-ARSENAL-01
#
# Lives in: /etc/nginx/sites-enabled/mzansiedge (NOT in this repo — Nginx
# loads from /etc/nginx/sites-enabled/* and the file is owned by root).
# This snippet is the canonical source of truth — paste it into the live
# server block, alongside the other /assets/* location blocks.
#
# Apply:
#   sudo nano /etc/nginx/sites-enabled/mzansiedge
#   # paste the location block below after the /assets/channels/ block
#   sudo nginx -t && sudo systemctl reload nginx

location ^~ /assets/news/ {
    alias /home/paulsportsza/assets/news/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}
