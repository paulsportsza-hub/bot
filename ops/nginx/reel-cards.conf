# FIX-DASH-REEL-WIDGET-01 — scoped Cache-Control for reel kit assets.
#
# Lives in: /etc/nginx/sites-enabled/mzansiedge (NOT in this repo — Nginx
# loads from /etc/nginx/sites-enabled/* and the file is owned by root).
# This snippet is the canonical source of truth — paste it into the live
# server block above the generic regex match for *.png/*.css/*.js.
#
# Why scoped: the regex location at the bottom of the server block sets
# Cache-Control: public, immutable + max-age=2592000 (30 days). Reel
# cards regenerate daily — defeating that immutable rule for /assets/
# reel-cards/ keeps every other static asset on the long cache while
# making reel kit refreshes effective within minutes.
#
# Apply:
#   sudo cp ops/nginx/reel-cards.conf /etc/nginx/sites-available/reel-cards.conf
#   # then paste the location block into /etc/nginx/sites-enabled/mzansiedge
#   sudo nginx -t && sudo systemctl reload nginx

location ^~ /assets/reel-cards/ {
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    access_log off;
}
