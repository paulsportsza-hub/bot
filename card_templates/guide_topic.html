<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-secondary: #B3B3B3; }
        html, body { margin: 0; padding: 0; background: #000000; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; width: 480px; }
        .card { width: 100%; background: #0A0A0A; color: #FFFFFF; }

        .header {
            position: relative;
            text-align: center;
            padding: 20px 20px 14px;
            isolation: isolate;
            overflow: hidden;
        }
        .logo-glow {
            position: absolute; inset: -10px 0 0 0; pointer-events: none; z-index: 0;
            filter: blur(3px);
            background: radial-gradient(ellipse 50% 90% at 50% 25%,
                #F7931A38 0%, #F7931A18 45%, #F7931A06 70%, transparent 100%);
        }
        .logo-glow-screen {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            mix-blend-mode: screen;
            background: radial-gradient(ellipse 32% 60% at 50% 28%,
                #F7931A66 0%, #F7931A22 50%, transparent 80%);
        }
        .header > .logo-img, .header > .logo-fallback,
        .header > .orange-bar, .header > .title, .header > .subtitle { position: relative; z-index: 1; }
        .logo-img { height: 32px; width: auto; display: block; margin: 0 auto; }
        .orange-bar {
            height: 3px;
            background: linear-gradient(90deg, #FF6B00, #F7931A, #FFBE45);
            margin: 10px 20px; border-radius: 2px;
        }
        .title {
            font-size: 15px; font-weight: 700; color: #FFFFFF;
            letter-spacing: 0; margin-bottom: 5px;
        }
        .subtitle {
            font-size: 11px; color: var(--text-secondary); font-weight: 400;
        }

        .body { padding: 14px 18px 18px; }
        .topic-panel {
            background: #111111;
            border: 1px solid #1E1E1E;
            border-left: 3px solid #F7931A;
            border-radius: 8px;
            padding: 14px 15px 15px;
        }
        .topic-heading {
            font-size: 16px;
            line-height: 1.25;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 10px;
        }
        .topic-body {
            font-size: 12px;
            line-height: 1.48;
            color: var(--text-secondary);
            white-space: pre-line;
        }
        .topic-body b { color: #FFFFFF; font-weight: 800; }
        .topic-body i { color: #DDDDDD; }
        .topic-body code {
            font-family: 'JetBrains Mono', monospace;
            color: #F7931A;
            background: #F7931A14;
            border-radius: 5px;
            padding: 1px 4px;
            font-size: 10.5px;
        }
        .back-row {
            display: flex;
            justify-content: center;
            padding-top: 12px;
        }
        .back-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 7px 13px;
            border-radius: 8px;
            border: 1px solid #F7931A45;
            background: #F7931A14;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 800;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="logo-glow"></div>
        <div class="logo-glow-screen"></div>
        {% if header_logo_b64 %}
        <img class="logo-img" src="{{ header_logo_b64 }}" alt="MzansiEdge" />
        {% else %}
        <div class="logo-fallback" style="font-size:22px;font-weight:800;letter-spacing:0;background:linear-gradient(90deg,#F7931A,#FFBE45);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">MzansiEdge</div>
        {% endif %}
        <div class="orange-bar"></div>
        <div class="title">GUIDE</div>
        <div class="subtitle">Topic detail</div>
    </div>

    <div class="body">
        <div class="topic-panel">
            <div class="topic-heading">{{ title_html | safe }}</div>
            <div class="topic-body">{{ body_html | safe }}</div>
        </div>
        <div class="back-row">
            <div class="back-pill">{{ back_label | e }}</div>
        </div>
    </div>
</div>
</body>
</html>
