<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-secondary: #B3B3B3; }
        html, body { margin: 0; padding: 0; background: #000000; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; width: 480px; }
        .card { width: 100%; background: #0A0A0A; }

        .header {
            position: relative; text-align: center; padding: 20px 20px 14px;
            isolation: isolate; overflow: hidden;
        }
        .logo-glow {
            position: absolute; inset: -10px 0 0 0; pointer-events: none; z-index: 0;
            filter: blur(3px);
            background: radial-gradient(ellipse 50% 90% at 50% 25%,
                #F7931A38 0%, #F7931A18 45%, #F7931A06 70%, transparent 100%);
        }
        .logo-glow-screen {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            mix-blend-mode: screen;
            background: radial-gradient(ellipse 32% 60% at 50% 28%,
                #F7931A66 0%, #F7931A22 50%, transparent 80%);
        }
        .header > .logo-img, .header > .logo-fallback,
        .header > .orange-bar, .header > .title, .header > .subline { position: relative; z-index: 1; }
        .logo-img { height: 32px; width: auto; display: block; margin: 0 auto; }
        .orange-bar {
            height: 3px;
            background: linear-gradient(90deg, #FF6B00, #F7931A, #FFBE45);
            margin: 10px 20px; border-radius: 2px;
        }
        .title {
            font-size: 15px; font-weight: 700; color: #FFFFFF;
            letter-spacing: 3px; margin-bottom: 5px;
        }
        .subline { font-size: 11px; color: var(--text-secondary); font-weight: 400; }

        .body { padding: 20px 20px 22px; }

        .hero-block {
            position: relative;
            text-align: center;
            background: #0F0F0F;
            border: 1px solid #2A2A2A;
            border-left: 3px solid #F7931A;
            border-radius: 12px;
            padding: 18px 18px 16px;
            margin-bottom: 12px;
            overflow: hidden; isolation: isolate;
        }
        .hero-glow {
            position: absolute; inset: -30px -10px; pointer-events: none; z-index: 0;
            filter: blur(20px);
            background: radial-gradient(ellipse 50% 90% at 0% 50%,
                #F7931A22 0%, transparent 70%);
        }
        .hero-block > * { position: relative; z-index: 1; }

        .hero-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 44px; height: 44px;
            background: #F7931A14; border: 1px solid #F7931A40;
            border-radius: 50%;
            font-size: 22px; line-height: 1;
            margin-bottom: 10px;
        }
        .hero-title {
            font-size: 17px; font-weight: 800; color: #FFFFFF;
            margin-bottom: 6px; letter-spacing: -0.3px;
        }
        .hero-sub {
            font-size: 12.5px; color: var(--text-secondary); line-height: 1.5;
        }

        .reply-hint {
            position: relative;
            background: linear-gradient(135deg, #1A1200, #211800);
            border: 1px solid #F7931A55;
            border-left: 3px solid #F7931A;
            border-radius: 10px;
            padding: 11px 14px;
            text-align: center;
            font-size: 12px; color: #FFBE45; line-height: 1.4;
            overflow: hidden; isolation: isolate;
        }
        .reply-hint-glow {
            position: absolute; inset: -20px -10px; pointer-events: none; z-index: 0;
            filter: blur(8px);
            background: radial-gradient(ellipse 60% 120% at 50% 50%,
                #F7931A30 0%, #F7931A10 45%, transparent 80%);
        }
        .reply-hint > .reply-hint-text { position: relative; z-index: 1; }
        .reply-hint-text strong {
            color: #F7931A; font-weight: 800;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="logo-glow"></div>
        <div class="logo-glow-screen"></div>
        {% if header_logo_b64 %}
        <img class="logo-img" src="{{ header_logo_b64 }}" alt="MzansiEdge" />
        {% else %}
        <div class="logo-fallback" style="font-size:22px;font-weight:800;letter-spacing:0.1em;background:linear-gradient(90deg,#F7931A,#FFBE45);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">MzansiEdge</div>
        {% endif %}
        <div class="orange-bar"></div>
        <div class="title">SUBSCRIBE</div>
        <div class="subline">One step from setting up your subscription</div>
    </div>

    <div class="body">
        <div class="hero-block">
            <div class="hero-glow"></div>
            <div class="hero-icon">✉️</div>
            <div class="hero-title">Enter your email to get started</div>
            <div class="hero-sub">
                We need your email to set up secure payment and send your subscription confirmation.
            </div>
        </div>

        <div class="reply-hint">
            <div class="reply-hint-glow"></div>
            <div class="reply-hint-text">
                <strong>Reply</strong> with your email address in the chat below.
            </div>
        </div>
    </div>
</div>
</body>
</html>
