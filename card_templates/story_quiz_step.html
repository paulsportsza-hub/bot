<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-secondary: #B3B3B3; }
        html, body { margin: 0; padding: 0; background: #000000; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; width: 480px; }
        .card { width: 100%; background: #0A0A0A; }

        .header {
            position: relative; text-align: center; padding: 20px 20px 12px;
            isolation: isolate; overflow: hidden;
        }
        .logo-glow {
            position: absolute; inset: -10px 0 0 0; pointer-events: none; z-index: 0;
            filter: blur(3px);
            background: radial-gradient(ellipse 50% 90% at 50% 25%,
                #F7931A38 0%, #F7931A18 45%, #F7931A06 70%, transparent 100%);
        }
        .logo-glow-screen {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            mix-blend-mode: screen;
            background: radial-gradient(ellipse 32% 60% at 50% 28%,
                #F7931A66 0%, #F7931A22 50%, transparent 80%);
        }
        .header > .logo-img, .header > .logo-fallback,
        .header > .orange-bar, .header > .step-meta,
        .header > .title, .header > .progress-bar { position: relative; z-index: 1; }
        .logo-img { height: 32px; width: auto; display: block; margin: 0 auto; }
        .orange-bar {
            height: 3px;
            background: linear-gradient(90deg, #FF6B00, #F7931A, #FFBE45);
            margin: 10px 20px; border-radius: 2px;
        }
        .step-meta {
            font-size: 10px; color: var(--text-secondary);
            letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase;
            margin-bottom: 5px;
        }
        .step-meta strong { color: #F7931A; }
        .title {
            font-size: 14px; font-weight: 700; color: #FFFFFF;
            letter-spacing: 2.5px; margin-bottom: 10px;
        }
        .progress-bar {
            position: relative;
            height: 5px; background: #1E1E1E;
            margin: 0 20px; border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B00, #F7931A, #FFBE45);
            border-radius: 3px;
            box-shadow: 0 0 6px #F7931A55;
        }

        .body { padding: 18px 20px 20px; }

        .notification-key {
            display: inline-flex; align-items: center;
            font-size: 10px; color: #F7931A;
            font-weight: 800; letter-spacing: 1.5px;
            text-transform: uppercase;
            background: #F7931A14;
            border: 1px solid #F7931A40;
            border-left: 3px solid #F7931A;
            border-radius: 4px;
            padding: 3px 9px;
            margin-bottom: 10px;
        }

        .question {
            font-size: 18px; font-weight: 800; color: #FFFFFF;
            margin-bottom: 8px; line-height: 1.3;
            letter-spacing: -0.3px;
        }
        .body-text {
            font-size: 13px; color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="logo-glow"></div>
        <div class="logo-glow-screen"></div>
        {% if header_logo_b64 %}
        <img class="logo-img" src="{{ header_logo_b64 }}" alt="MzansiEdge" />
        {% else %}
        <div class="logo-fallback" style="font-size:22px;font-weight:800;letter-spacing:0.1em;background:linear-gradient(90deg,#F7931A,#FFBE45);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">MzansiEdge</div>
        {% endif %}
        <div class="orange-bar"></div>
        <div class="step-meta">Edge Alerts — <strong>{{ step_num }} / {{ total_steps }}</strong></div>
        <div class="title">NOTIFICATION PREFS</div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: {{ (step_num / total_steps * 100) | int }}%;"></div>
        </div>
    </div>

    <div class="body">
        {% if notification_key %}
        <div class="notification-key">{{ notification_key | upper | replace('_', ' ') }}</div>
        {% endif %}
        <div class="question">{{ title | e }}</div>
        <div class="body-text">{{ body | e }}</div>
    </div>
</div>
</body>
</html>
