<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-secondary: #B3B3B3; }
        html, body { margin: 0; padding: 0; background: #000000; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            width: 480px; padding: 2px; box-sizing: content-box;
        }
        .card { width: 100%; background: #0A0A0A; border-radius: 0; overflow: hidden; }
        .header {
            text-align: center; padding: 22px 20px 14px;
            background: linear-gradient(180deg, #0D0D0D, #141414);
            border-bottom: 1px solid #2A2A2A;
        }
        .logo-img { height: 30px; width: auto; display: block; margin: 0 auto; }
        .logo-fallback { font-size: 14px; font-weight: 700; color: #F7931A; }
        .orange-bar {
            height: 3px;
            background: linear-gradient(90deg, #FF6B00, #F7931A, #FFBE45);
            margin: 10px 20px; border-radius: 2px;
        }
        .title { font-size: 14px; font-weight: 700; color: #FFFFFF; letter-spacing: 3px; }
        .body { padding: 24px 20px; }
        .status-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 18px; padding-bottom: 16px;
            border-bottom: 1px solid #1E1E1E;
        }
        .status-icon { font-size: 28px; }
        .status-text {
            font-size: 15px; font-weight: 700; color: var(--text-secondary);
        }
        .info-block {
            display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: #0F0F0F; border-radius: 6px;
        }
        .info-label { font-size: 12px; color: var(--text-secondary); }
        .info-value  { font-size: 12px; color: #FFFFFF; font-weight: 600; }
        .cta-hint {
            font-size: 12px; color: var(--text-secondary);
            text-align: center; padding-top: 12px;
            border-top: 1px solid #1E1E1E;
        }
        .cta-hint strong { color: #F7931A; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        {% if header_logo_b64 %}
        <img class="logo-img" src="{{ header_logo_b64 }}" alt="MzansiEdge" />
        {% else %}
        <div class="logo-fallback">MzansiEdge</div>
        {% endif %}
        <div class="orange-bar"></div>
        <div class="title">BILLING</div>
    </div>
    <div class="body">
        <div class="status-row">
            <div class="status-icon">⭕</div>
            <div class="status-text">No active subscription</div>
        </div>

        {% if last_plan or ended_at %}
        <div class="info-block">
            {% if last_plan %}
            <div class="info-row">
                <div class="info-label">Last plan</div>
                <div class="info-value">{{ last_plan | e }}</div>
            </div>
            {% endif %}
            {% if ended_at %}
            <div class="info-row">
                <div class="info-label">Ended</div>
                <div class="info-value">{{ ended_at | e }}</div>
            </div>
            {% endif %}
        </div>
        {% endif %}

        <div class="cta-hint">Use <strong>/subscribe</strong> to view current plans.</div>
    </div>
</div>
</body>
</html>
