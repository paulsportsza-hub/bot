<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-secondary: #B3B3B3; }
        html, body {
            margin: 0; padding: 0; background: #000000;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            width: 480px;
        }
        .card {
            width: 100%;
            background: #0A0A0A;
        }

        /* Old tier color CSS variables (drives header glow) */
        .tier-old-gold {
            --old-color: #FFD700;
            --old-color-2: #FFBE45;
            --old-color-soft: #FFD70022;
            --old-color-glow: #FFD70055;
        }
        .tier-old-diamond {
            --old-color: #B9F2FF;
            --old-color-2: #8EE6F8;
            --old-color-soft: #B9F2FF22;
            --old-color-glow: #B9F2FF60;
        }

        /* ── Header (canonical — old-tier-color logo glow) ── */
        .header {
            position: relative;
            text-align: center;
            padding: 20px 20px 14px;
            isolation: isolate;
            overflow: hidden;
        }
        .logo-glow {
            position: absolute;
            inset: -10px 0 0 0;
            pointer-events: none;
            z-index: 0;
            filter: blur(3px);
            background: radial-gradient(ellipse 50% 90% at 50% 25%,
                var(--old-color-glow) 0%, var(--old-color-soft) 45%, transparent 75%);
        }
        .logo-glow-screen {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
            background: radial-gradient(ellipse 32% 60% at 50% 28%,
                var(--old-color-glow) 0%, var(--old-color-soft) 50%, transparent 80%);
        }
        .header > .logo-img,
        .header > .logo-fallback,
        .header > .tier-bar,
        .header > .title,
        .header > .subline { position: relative; z-index: 1; }
        .logo-img {
            height: 32px; width: auto;
            display: block; margin: 0 auto;
        }
        .tier-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--old-color-2), var(--old-color), var(--old-color-2));
            margin: 10px 20px;
            border-radius: 2px;
        }
        .title {
            font-size: 14px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .subline {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ── Body ──────────────────────────────────────────────── */
        .body {
            padding: 16px 20px 18px;
        }

        /* Tier-flow row — old → new */
        .tier-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .tier-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0F0F0F;
            border: 1px solid;
            border-left-width: 3px;
            border-radius: 10px;
            padding: 9px 13px;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
        }
        .tier-chip-emoji { font-size: 18px; }
        .tier-chip.old-gold {
            border-color: #FFD70040;
            border-left-color: #FFD700;
            color: #FFD700;
            background: #FFD7000A;
        }
        .tier-chip.old-diamond {
            border-color: #B9F2FF40;
            border-left-color: #B9F2FF;
            color: #B9F2FF;
            background: #B9F2FF0A;
        }
        .tier-chip.new-bronze {
            border-color: #CD7F3240;
            border-left-color: #CD7F32;
            color: #CD7F32;
            background: #CD7F320A;
        }
        .tier-arrow {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 700;
        }

        /* Hero message */
        .hero-msg {
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 14px;
            line-height: 1.3;
            letter-spacing: -0.2px;
        }
        .hero-msg-sub {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        /* Renew CTA */
        .renew-cta {
            position: relative;
            background: linear-gradient(135deg, #1A1200, #2A1E00);
            border: 1px solid #F7931A55;
            border-radius: 10px;
            padding: 12px 14px;
            text-align: center;
            overflow: hidden;
            isolation: isolate;
        }
        .renew-glow {
            position: absolute;
            inset: -20px -10px;
            pointer-events: none;
            z-index: 0;
            filter: blur(8px);
            background: radial-gradient(ellipse 60% 120% at 50% 50%,
                #F7931A30 0%, #F7931A10 45%, transparent 80%);
        }
        .renew-cta > .renew-text { position: relative; z-index: 1; }
        .renew-text {
            font-size: 12px;
            color: #FFBE45;
            line-height: 1.5;
            font-weight: 600;
        }
        .renew-text code {
            font-family: 'JetBrains Mono', monospace;
            color: #F7931A;
            font-weight: 800;
            background: #F7931A20;
            padding: 1px 7px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="card tier-old-{{ old_tier }}">

    <!-- Header -->
    <div class="header">
        <div class="logo-glow"></div>
        <div class="logo-glow-screen"></div>
        {% if header_logo_b64 %}
        <img class="logo-img" src="{{ header_logo_b64 }}" alt="MzansiEdge" />
        {% else %}
        <div class="logo-fallback" style="font-size:22px;font-weight:800;letter-spacing:0.1em;background:linear-gradient(90deg,#F7931A,#FFBE45);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">MzansiEdge</div>
        {% endif %}
        <div class="tier-bar"></div>
        <div class="title">SUBSCRIPTION EXPIRED</div>
        <div class="subline">Your access has reverted to Bronze</div>
    </div>

    <!-- Body -->
    <div class="body">

        <div class="hero-msg">Your subscription has expired</div>

        <div class="tier-flow">
            <div class="tier-chip old-{{ old_tier }}">
                <span class="tier-chip-emoji">{{ old_tier_emoji }}</span>
                <span>{{ old_tier_name | e }}</span>
            </div>
            <div class="tier-arrow">→</div>
            <div class="tier-chip new-bronze">
                <span class="tier-chip-emoji">🥉</span>
                <span>Bronze</span>
            </div>
        </div>

        <div class="renew-cta">
            <div class="renew-glow"></div>
            <div class="renew-text">
                Use <code>/subscribe</code> to renew and restore your access.
            </div>
        </div>

    </div>

</div>
</body>
</html>
