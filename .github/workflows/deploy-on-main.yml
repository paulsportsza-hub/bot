# deploy-on-main.yml — SSH-based production deploy gate for paulsportsza-hub/bot.
#
# Original brief: FIX-BOT-RUNTIME-WORKTREE-ISOLATION-01 (T66, 2026-05-07).
#
# PUSH TRIGGER DISABLED — OPS-CI-DEPLOY-ON-MAIN-DISABLE-01 (2026-05-07)
# -----------------------------------------------------------------------
# The push: trigger was removed because three required GitHub Actions secrets
# (PROD_HOST, PROD_USER, PROD_SSH_KEY) are not yet configured on this repo,
# causing every push to main to fail immediately at the ssh-agent setup step.
# Continuing to fire on push creates noisy failure notifications with zero
# operational value.
#
# workflow_dispatch: is intentionally preserved so this workflow remains
# visible in the GitHub Actions UI and can be triggered manually once the
# secrets are provisioned.
#
# RE-ENABLE: OPS-CI-DEPLOY-ON-MAIN-RE-ENABLE-01 (queued)
# --------------------------------------------------------
# The re-enable brief will:
#   1. Provision PROD_HOST / PROD_USER / PROD_SSH_KEY secrets on this repo.
#   2. Ratify whether the deploy script should be invoked from the runner
#      checkout (via actions/checkout@v4) or from the stable prod path
#      (/home/paulsportsza/bot-prod/scripts/deploy_bot_prod.sh), rather
#      than from the dev tree as originally authored.
#   3. Restore the push: trigger in this file.
#
# The deploy itself runs on the box (not in a GitHub-hosted runner) — this
# workflow SSHes in and invokes scripts/deploy_bot_prod.sh with the pushed
# SHA. SSH credentials live in GitHub Actions secrets:
#   secrets.PROD_HOST          (e.g. 37.27.179.53)
#   secrets.PROD_USER          (paulsportsza)
#   secrets.PROD_SSH_KEY       (private key for the deploy user)
#
# Failure modes covered by the deploy script itself:
#   - SHA not on origin/main → exit 2
#   - bot.py AST parse failure → exit 3
#   - service did not emit "Startup Truth" within DEPLOY_STARTUP_TIMEOUT → exit 4 (auto-rollback fires)
#
# This workflow simply surfaces those exits in CI.

name: deploy-on-main

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA to deploy (defaults to push SHA)"
        required: false

concurrency:
  group: deploy-on-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          # Validate the SHA before letting it cross into the SSH command
          # below — workflow_dispatch input is user-controlled, so an
          # unvalidated value would let a caller inject extra shell tokens
          # into the remote bash invocation (Codex P2).
          SHA="${{ github.event.inputs.sha || github.sha }}"
          if ! [[ "$SHA" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "::error::SHA '$SHA' is not a hex-only 7–40 char string"
              exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add prod host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Invoke deploy_bot_prod.sh
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          # Always invoke the script from the DEV tree (writable, mutable
          # source of truth). bot-prod/ is read-only; running its copy of
          # the script would create a bootstrap problem when the script
          # itself is changed.
          ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "bash /home/paulsportsza/bot/scripts/deploy_bot_prod.sh $SHA"

      - name: Report deploy outcome
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Deploy succeeded — bot-prod is at ${{ steps.sha.outputs.sha }}"
          else
            echo "::error::Deploy failed — auto-rollback triggered. Inspect journalctl -u mzansi-bot on prod host."
          fi
