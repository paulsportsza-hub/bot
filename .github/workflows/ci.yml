name: Pre-Merge Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      TELEGRAM_E2E_BOT_TOKEN: ${{ secrets.TELEGRAM_E2E_BOT_TOKEN }}
      TELEGRAM_E2E_TEST_CHAT_ID: ${{ secrets.TELEGRAM_E2E_TEST_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pre-Merge Gate
        run: |
          chmod +x scripts/pre_merge_gate.sh scripts/env_guard.sh
          ./scripts/pre_merge_gate.sh
