name: Pre-Merge Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      TELEGRAM_E2E_BOT_TOKEN: ${{ secrets.TELEGRAM_E2E_BOT_TOKEN }}
      TELEGRAM_E2E_TEST_CHAT_ID: ${{ secrets.TELEGRAM_E2E_TEST_CHAT_ID }}
      SCRAPERS_ROOT: ${{ github.workspace }}/scrapers
      BOT_ROOT: ${{ github.workspace }}/bot
    steps:
      - uses: actions/checkout@v4
        with:
          path: bot
      - uses: actions/checkout@v4
        with:
          repository: paulsportsza/scrapers
          path: scrapers
          token: ${{ secrets.SCRAPERS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies and run gate
        run: |
          cd bot && pip install -r requirements.txt
          cd ../scrapers && pip install -r requirements.txt || true
          cd ../bot && chmod +x scripts/pre_merge_gate.sh scripts/env_guard.sh
          bash scripts/pre_merge_gate.sh
